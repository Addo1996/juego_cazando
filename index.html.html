<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Snake Cat</title>
    <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego()">

    <div class="game-ui">
        <h1>🐍 Snake Cat</h1>
        <p class="autor">Caza el ratón 🐭</p>

        <div class="panel">
            <span>⭐ <span id="puntaje">0</span></span>
            <span>⏱️ <span id="tiempo">120</span></span>
        </div>

        <canvas id="areaJuego" width="500" height="500"></canvas>

        <div class="controles">
            <button onclick="moverArriba()">▲</button>
            <div>
                <button onclick="moverIzquierda()">◀</button>
                <button onclick="moverDerecha()">▶</button>
            </div>
            <button onclick="moverAbajo()">▼</button>
        </div>

        <button class="reset" onclick="reiniciarJuego()">Reiniciar</button>
    </div>

    <script src="cazando.js"></script>
</body>
</html>
