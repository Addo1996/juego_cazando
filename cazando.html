<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Cazando</title>
    <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego()">

    <h1>JUEGO CAZANDO</h1>
    <p>Autor: Addonys</p>

    <!-- CANVAS -->
    <canvas id="areaJuego" width="500" height="500"></canvas>

    <!-- CONTROLES -->
    <div class="controles">
        <button onclick="moverArriba()">Arriba</button>
        <div>
            <button onclick="moverIzquierda()">Izquierda</button>
            <button onclick="moverDerecha()">Derecha</button>
        </div>
        <button onclick="moverAbajo()">Abajo</button>
    </div>

    <!-- MARCADOR -->
    <div class="marcador">
        <p>Puntos: <span id="puntaje">0</span></p>
        <p>Tiempo: <span id="tiempo">10</span></p>
    </div>

    <!-- BOTÓN REINICIAR -->
    <button onclick="reiniciarJuego()">Reiniciar</button>

    <!-- JS -->
    <script src="cazando.js"></script>

</body>
</html>
